[custom]
; 基准模板：你的自定义 YAML（包含 rule-providers 定义）
clash_rule_base=https://raw.githubusercontent.com/toamdou/mihomo-rule-set/refs/heads/main/clash.yaml

; 转换设置
clash_rule_provider=true
overwrite_original_rules=false

; ===========================================================
; 策略组定义（保留，这些会合并到最终配置）
; ===========================================================

; 1. 核心节点选择组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇲🇾 亚洲节点`[]🇪🇺 欧洲节点`[]🚀 手动切换`[]🎯 全球直连

; 2. 功能分流组
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇲🇾 亚洲节点`[]🇪🇺 欧洲节点`[]♻️ 自动选择`[]🎯 全球直连
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇲🇾 亚洲节点`[]🇪🇺 欧洲节点`[]♻️ 自动选择`[]🎯 全球直连
custom_proxy_group=💬 Ai平台`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇲🇾 亚洲节点`[]🇪🇺 欧洲节点`[]♻️ 自动选择`[]🎯 全球直连
custom_proxy_group=Google`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇲🇾 亚洲节点`[]🇪🇺 欧洲节点`[]♻️ 自动选择`[]🎯 全球直连
; 3. 区域节点组
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(港|HK|hk|Hong Kong|🇭🇰)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(日本|🇯🇵|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(?i)(美|🇺🇸|US|America|United States)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇲🇾 亚洲节点`url-test`(?i)(马来|泰国|越南|VN|KR|Korea|KOR|首尔|韩|台|🇹🇼|TW|Taiwan|新|🇸🇬|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇪🇺 欧洲节点`url-test`(?i)(英国|德国|卢森堡|法国|俄罗斯|France|Deutschland|United Kingdom|Italy|Netherland)`http://www.gstatic.com/generate_204`300,,50

; 4. 基础控制组 
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 5. 其他专用组
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]♻️ 自动选择

; 规则设置 (使用 ACL4SSR 的文本链接追加到对应分组)
; ===========================================================
ruleset=🎯 全球直连,https://raw.githubusercontent.com/toamdou/mihomo-rule-set/refs/heads/main/empty.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/toamdou/mihomo-rule-set/refs/heads/main/empty.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/toamdou/mihomo-rule-set/refs/heads/main/empty.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/toamdou/mihomo-rule-set/refs/heads/main/empty.list
